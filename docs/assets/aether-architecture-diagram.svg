<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Aether Architecture Diagram</title>
  <desc id="desc">Frontend, shared UI, site config, backend, privacy layer, peer navigator, and sentiment detection connections.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .title { font: 700 24px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Ubuntu,sans-serif; fill: #0f172a; }
      .text { font: 600 18px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Ubuntu,sans-serif; fill: #1e293b; }
      .small { font: 500 14px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Ubuntu,sans-serif; fill: #475569; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .label { font: 600 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Ubuntu,sans-serif; fill: #1d4ed8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="540" />
  <text class="title" x="40" y="48">Aether Architecture</text>

  <rect class="card" x="50" y="120" width="300" height="90" />
  <text class="text" x="75" y="162">Frontend</text>
  <text class="small" x="75" y="188">Next.js + Tailwind</text>

  <rect class="card" x="430" y="70" width="300" height="90" />
  <text class="text" x="455" y="112">Shared UI Components</text>

  <rect class="card" x="430" y="195" width="300" height="90" />
  <text class="text" x="455" y="237">Site Config</text>

  <rect class="card" x="430" y="340" width="300" height="110" />
  <text class="text" x="455" y="382">Backend</text>
  <text class="small" x="455" y="408">Node.js, AI, Peer Matching</text>

  <rect class="card" x="850" y="70" width="300" height="80" />
  <text class="text" x="875" y="114">Privacy Layer</text>

  <rect class="card" x="850" y="190" width="300" height="80" />
  <text class="text" x="875" y="234">Peer-Navigator</text>

  <rect class="card" x="850" y="310" width="300" height="90" />
  <text class="text" x="875" y="350">Sentiment and Crisis</text>
  <text class="small" x="875" y="374">Detection</text>

  <path class="line" d="M350 160 C385 160, 395 110, 430 110" />
  <text class="label" x="370" y="125">UI</text>

  <path class="line" d="M580 160 L580 195" />
  <text class="label" x="590" y="184">Config</text>

  <path class="line" d="M350 170 C410 170, 360 390, 430 390" />
  <text class="label" x="365" y="330">API</text>

  <path class="line" d="M730 375 C800 375, 780 110, 850 110" />
  <text class="label" x="760" y="182">Federated Learning</text>

  <path class="line" d="M730 395 C800 395, 790 230, 850 230" />
  <text class="label" x="780" y="262">Peer Support</text>

  <path class="line" d="M730 415 C800 415, 800 355, 850 355" />
  <text class="label" x="780" y="405">AI Triage</text>
</svg>
